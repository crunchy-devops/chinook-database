pg_version_info:
  query: "SELECT current_setting('server_version') as version, current_setting('server_version_num')::numeric as version_num"
  metrics:
    - version:
        usage: "LABEL"
        description: "Version de PostgreSQL en texte"
    - version_num:
        usage: "GAUGE"
        description: "Version de PostgreSQL en format numérique"

pg_start_time:
  query: |
    SELECT
      current_database() AS datname,
      EXTRACT(EPOCH FROM pg_postmaster_start_time()) AS start_time_seconds
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - start_time_seconds:
        usage: "GAUGE"
        description: "PostgreSQL start time in seconds since epoch"