# /etc/promtail/config.yml
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: postgresql
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Cibler uniquement les containers avec le label logging=promtail
          - name: label
            values: [ "logging=promtail" ]
    relabel_configs:
      # Récupérer les labels Docker comme labels Loki
      - source_labels: [ __meta_docker_container_label_logging_job ]
        target_label: job

      - source_labels: [ __meta_docker_container_label_logging_env ]
        target_label: env

      - source_labels: [ __meta_docker_container_name ]
        regex: '/(.*)'
        target_label: container

      - source_labels: [ __meta_docker_container_id ]
        target_label: container_id


    pipeline_stages:
      # Ré-assembler les requêtes multi-lignes (EXPLAIN, requêtes longues)
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}'
          max_wait_time: 3s

      # Parser les champs clés du log PostgreSQL
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+)\s\w+\s\[(?P<pid>\d+)\]\s(?P<user>\S+)@(?P<database>\S+).*?duration:\s(?P<duration_ms>[\d\.]+)\s.*?statement:\s(?P<statement>.*)'

      # Extraire la durée comme label numérique
      - labels:
          user:
          database:
          pid:

      # Garder uniquement les lignes contenant "duration" (filtrer le bruit)
      - match:
          selector: '{job="postgresql"}'
          stages:
            - drop:
                expression: '.*duration:.*'
                drop_counter_reason: not_slow_query